<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Softwrite</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <span class="logo">Soft<span>Write</span>.</span>
      <button class="btn-icon" id="btn-hide-sidebar" title="Hide sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
      </button>
    </div>
    <div class="sidebar-actions">
      <button class="btn-new" id="btn-new-doc">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        New document
      </button>
    </div>
    <div id="doc-list"></div>
    <div class="sidebar-footer">
      <button class="btn-icon" id="btn-theme" title="Toggle theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="icon-theme"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="btn-icon" id="btn-delete" title="Delete document">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
      <button class="btn-icon" id="btn-export" title="Export">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main id="main">

    <!-- Toolbar -->
    <div id="toolbar">
      <button class="btn-icon" id="btn-show-sidebar" title="Show sidebar" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
      </button>

      <div class="toolbar-group">
        <button class="btn-fmt" id="fmt-bold" title="Bold (Ctrl+B)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg>
          <span>Bold</span>
        </button>
        <button class="btn-fmt" id="fmt-italic" title="Italic (Ctrl+I)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>
          <span>Italic</span>
        </button>
        <button class="btn-fmt" id="fmt-h1" title="Heading 1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16M4 6h6M4 18h6"/></svg>
          <span>H1</span>
        </button>
        <button class="btn-fmt" id="fmt-h2" title="Heading 2">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h8M4 6h6M4 18h6"/></svg>
          <span>H2</span>
        </button>
        <button class="btn-fmt" id="fmt-quote" title="Blockquote">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 2v5c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 2v5c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
          <span>Quote</span>
        </button>
        <button class="btn-fmt" id="fmt-code" title="Code">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          <span>Code</span>
        </button>
        <button class="btn-fmt" id="fmt-hr" title="Divider">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/></svg>
          <span>Line</span>
        </button>
      </div>

      <div class="toolbar-sep"></div>

      <div class="toolbar-group toolbar-right">
        <button class="btn-fmt" id="btn-view-write" title="Write mode">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          <span>Write</span>
        </button>
        <button class="btn-fmt" id="btn-view-split" title="Split view">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
          <span>Split</span>
        </button>
        <button class="btn-fmt" id="btn-view-preview" title="Preview mode">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span>Preview</span>
        </button>
        <div class="toolbar-sep"></div>
        <button class="btn-fmt" id="btn-focus" title="Focus mode (F11)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          <span>Focus</span>
        </button>
      </div>
    </div>

    <!-- Stats bar -->
    <div id="statsbar">
      <span class="stat">Words: <span class="stat-val" id="stat-words">0</span></span>
      <span class="stat">Chars: <span class="stat-val" id="stat-chars">0</span></span>
      <span class="stat">Lines: <span class="stat-val" id="stat-lines">1</span></span>
      <span class="stat">Reading time: <span class="stat-val" id="stat-read">0 min</span></span>
      <span class="stat" style="margin-left:auto;" id="stat-save">Saved</span>
    </div>

    <!-- Content area -->
    <div id="content-area">
      <div id="editor-wrap">
        <div id="editor-col">
          <textarea id="doc-title" rows="1" placeholder="Untitled document" spellcheck="true" autocomplete="off"></textarea>
          <textarea id="editor" placeholder="Begin writing… supports Markdown syntax" spellcheck="true" autocomplete="off"></textarea>
        </div>
      </div>
      <div id="preview-wrap">
        <div id="preview-col"></div>
      </div>
    </div>

  </main>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-backdrop" id="modal-delete">
  <div class="modal">
    <h3>Delete document?</h3>
    <div class="modal-body">This document will be permanently removed from local storage. This cannot be undone.</div>
    <div class="modal-footer">
      <button class="btn-secondary" id="modal-delete-cancel">Cancel</button>
      <button class="btn-primary btn-danger" id="modal-delete-confirm">Delete</button>
    </div>
  </div>
</div>

<!-- Export Modal -->
<div class="modal-backdrop" id="modal-export">
  <div class="modal">
    <h3>Export document</h3>
    <div class="modal-body">
      <button class="export-btn" id="exp-md">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <div>
          <div>Markdown (.md)</div>
          <div class="export-btn-desc">Raw markdown text file</div>
        </div>
      </button>
      <button class="export-btn" id="exp-txt">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
        <div>
          <div>Plain text (.txt)</div>
          <div class="export-btn-desc">Stripped of markdown syntax</div>
        </div>
      </button>
      <button class="export-btn" id="exp-html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        <div>
          <div>HTML (.html)</div>
          <div class="export-btn-desc">Styled standalone web page</div>
        </div>
      </button>
      <button class="export-btn" id="exp-copy">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <div>
          <div>Copy to clipboard</div>
          <div class="export-btn-desc">Copy markdown text</div>
        </div>
      </button>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="modal-export-cancel">Close</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
